<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gridによるレイアウト練習</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <section>
      <h2>Gridの基本</h2>
      <div class="grid-container">
        <div class="grid-item">アイテム1</div>
        <div class="grid-item">アイテム2</div>
        <div class="grid-item">アイテム3</div>
      </div>
    </section>

    <section>
      <h2>カードギャラリー</h2>
      <div class="gallery">
        <div class="gallery-card">カード1</div>
        <div class="gallery-card">カード2</div>
        <div class="gallery-card">カード3</div>
        <div class="gallery-card">カード4</div>
        <div class="gallery-card">カード5</div>
        <div class="gallery-card">カード6</div>
      </div>
    </section>

    <section>
      <h2>聖杯レイアウト</h2>
      <div class="holy-grail-container">
        <header>ヘッダー</header>
        <nav>ナビゲーション</nav>
        <main>メインコンテンツ</main>
        <aside>サイドバー</aside>
        <footer>フッター</footer>
      </div>
    </section>
  </body>
</html>
